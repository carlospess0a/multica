name: multica

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-multica}
      POSTGRES_USER: ${POSTGRES_USER:-multica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-multica}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-multica} -d ${POSTGRES_DB:-multica}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ${MULTICA_BACKEND_IMAGE:-ghcr.io/multica-ai/multica-backend}:${MULTICA_IMAGE_TAG:-latest}
    depends_on:
      postgres:
        condition: service_healthy

    expose:
      - "8085"

    volumes:
      - backend_uploads:/app/data/uploads

    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-multica}:${POSTGRES_PASSWORD:-multica}@postgres:5432/${POSTGRES_DB:-multica}?sslmode=disable

      PORT: "8085"

      JWT_SECRET: ${JWT_SECRET}
      APP_ENV: production

      MULTICA_APP_URL: https://multica.karinscripts.com
      FRONTEND_ORIGIN: https://multica.karinscripts.com
      GOOGLE_REDIRECT_URI: https://multica.karinscripts.com/auth/callback

      MULTICA_PUBLIC_URL: https://multica.karinscripts.com

      ALLOW_SIGNUP: ${ALLOW_SIGNUP:-true}

      METRICS_ADDR: ${METRICS_ADDR:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}

      RESEND_API_KEY: ${RESEND_API_KEY:-}
      RESEND_FROM_EMAIL: ${RESEND_FROM_EMAIL:-noreply@multica.ai}

      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-25}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_TLS: ${SMTP_TLS:-}
      SMTP_TLS_INSECURE: ${SMTP_TLS_INSECURE:-false}

      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-us-west-2}

      CLOUDFRONT_DOMAIN: ${CLOUDFRONT_DOMAIN:-}
      CLOUDFRONT_KEY_PAIR_ID: ${CLOUDFRONT_KEY_PAIR_ID:-}
      CLOUDFRONT_PRIVATE_KEY: ${CLOUDFRONT_PRIVATE_KEY:-}

      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-}

      MULTICA_DEV_VERIFICATION_CODE: ${MULTICA_DEV_VERIFICATION_CODE:-}

      ALLOWED_EMAILS: ${ALLOWED_EMAILS:-}
      ALLOWED_EMAIL_DOMAINS: ${ALLOWED_EMAIL_DOMAINS:-}
      DISABLE_WORKSPACE_CREATION: ${DISABLE_WORKSPACE_CREATION:-}

      GITHUB_APP_SLUG: ${GITHUB_APP_SLUG:-}
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET:-}

      MULTICA_TRUSTED_PROXIES: ${MULTICA_TRUSTED_PROXIES:-}

    restart: unless-stopped

  frontend:
    image: ${MULTICA_WEB_IMAGE:-ghcr.io/multica-ai/multica-web}:${MULTICA_IMAGE_TAG:-latest}

    depends_on:
      - backend

    expose:
      - "3000"

    environment:
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      # Backend URL for Next.js API rewrites (proxies /api/* → backend)
      NEXT_PUBLIC_API_URL: http://backend:8085
      # App URL used for OAuth redirects, emails, etc.
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://multica.karinscripts.com}
      # Build-time version shown in UI
      NEXT_PUBLIC_APP_VERSION: ${MULTICA_IMAGE_TAG:-latest}

    restart: unless-stopped

volumes:
  pgdata:
  backend_uploads:
